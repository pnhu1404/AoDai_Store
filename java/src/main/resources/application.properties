spring.application.name=DoAnMonHoc

# 1. C?u h́nh K?t n?i Database MySQL
# Thay th? tên database, username, và password c?a b?n
spring.datasource.url=jdbc:mysql://localhost:3306/aodai_db?useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# 2. C?u h́nh Hibernate (JPA Provider)
